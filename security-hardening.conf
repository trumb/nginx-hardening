# =============================================================================
# Nginx Security Hardening Snippet
#
# Include this in every server block:
#   include /etc/nginx/snippets/security-hardening.conf;
#
# Derived from live honeypot data — blocks 16 attack categories observed
# from automated scanners within the first 10 minutes of deployment.
#
# Source: https://github.com/trumb/nginx-hardening
# License: MIT
# =============================================================================

# --- Security Headers ---
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

# --- Server Identity ---
server_tokens off;
autoindex off;

# =============================================================================
# BLOCKING RULES — Ordered by threat frequency (from honeypot data)
# =============================================================================

# --- 1. Dotfiles (.git, .env, .htaccess, .DS_Store, .vscode, .vite) ---
# Threat: Credential theft, source code exposure
# Observed: .env (15+ variants), .git/config, .git/HEAD, .DS_Store, .vscode/sftp.json
location ~ /\. {
    deny all;
    return 404;
}

# --- 2. Script extensions (PHP, ASP, JSP) ---
# Threat: Remote code execution
# Observed: info.php, phpinfo.php, test.php, i.php, php_info.php, app_dev.php, setup.php
location ~* \.(php|asp|aspx|jsp|cgi)$ {
    deny all;
    return 404;
}

# --- 3. Source maps (.map files) ---
# Threat: Source code theft, API key extraction from bundled JS
# Observed: main.js.map, bundle.js.map, stripe.js.map, credentials.json.map (20+ variants)
location ~* \.map$ {
    return 404;
}

# --- 4. Sensitive config/credential files ---
# Threat: Credential theft, infrastructure exposure
# Observed: credentials.json, config.env, env.json, env.js, docker-compose.yml
location ~* (docker-compose\.ya?ml|Dockerfile|Makefile|sftp\.json|environment\.(test|prod|dev)\.(ts|js)|wp-config\.php|web\.config|credentials\.json|config\.env|env\.json|env\.js|\.env) {
    deny all;
    return 404;
}

# --- 5. WordPress ---
# Threat: Plugin exploits, user enumeration, payment gateway theft
# Observed: wp-admin, wp-content/debug.log, wp-json/wc/v3/payment_gateways, xmlrpc.php
location ~* ^/(wp-admin|wp-login|wordpress|wp-includes|wp-content|wp-json|xmlrpc\.php) {
    return 404;
}

# --- 6. Java/Spring Boot Actuator ---
# Threat: Environment variable dump (DB creds, API keys)
# Observed: actuator/env, manage/env, api/actuator/env, configprops
location ~* ^/(actuator|manage/(env|configprops|health|info|beans|mappings)|configprops) {
    return 404;
}
location ~* /actuator/ {
    return 404;
}

# --- 7. Swagger/OpenAPI Documentation ---
# Threat: API enumeration, endpoint discovery
# Observed: swagger-ui.html, api-docs, v2/api-docs, v3/api-docs, webjars/swagger-ui
location ~* ^/(swagger|api-docs|v2/api-docs|v3/api-docs|webjars/swagger-ui) {
    return 404;
}
location ~* swagger\.json$ {
    return 404;
}

# --- 8. PHP/Laravel/Symfony Debug Tools ---
# Threat: Full application state dump, file read via profiler
# Observed: telescope, _ignition, _profiler, _wdt, __debug__, horizon
location ~* ^/(telescope|_ignition|_profiler|_wdt|__debug__|app_dev\.php|debug|horizon) {
    return 404;
}

# --- 9. Container/Kubernetes/Docker ---
# Threat: Container registry access, K8s secret theft
# Observed: v2/_catalog (Docker Registry), api/v1/namespaces/default/secrets
location ~* ^/(v2/_catalog|api/v1/namespaces) {
    return 404;
}

# --- 10. Vite/Webpack/Next.js Dev Tools ---
# Threat: Dev server access, HMR exploitation, source code theft
# Observed: @vite/client, webpack-dev-server, _next/data/
location ~* ^/(@vite|__webpack|_next/data|webpack-dev-server) {
    return 404;
}

# --- 11. Atlassian (Jira/Confluence) ---
# Threat: CVE exploitation (Confluence RCE), version fingerprinting
# Observed: login.action, /s/{hash}/_/;/META-INF/maven/.../pom.properties
location ~* (META-INF|login\.action|/s/[^/]+/_/) {
    return 404;
}

# --- 12. Microsoft Exchange ---
# Threat: ProxyShell/ProxyLogon exploitation
# Observed: /ecp/Current/exporttool/microsoft.exchange.ediscovery.exporttool.application
location ~* ^/ecp/ {
    return 404;
}

# --- 13. GraphQL Introspection ---
# Threat: Schema enumeration, data theft
# Observed: graphql, graphql?query={__schema{...}}, api/graphql, api/gql
location ~* ^/(graphql|api/graphql|api/gql) {
    return 404;
}

# --- 14. Admin/Management Panels ---
# Threat: Authentication bypass, brute force
# Observed: shell, console, phpmyadmin, adminer, solr, server-status
location ~* ^/(shell|console|portal|owa|SDK|phpmyadmin|myadmin|pma|adminer|solr|manager|jmx-console|invoker|status|server-status|server-info) {
    return 404;
}

# --- 15. CVE Probes ---
# Threat: Automated vulnerability scanning fingerprinting
# Observed: __cve_probe_cve_test_404 (sent multiple times to analyze response behavior)
location ~* __cve_probe {
    return 404;
}

# --- 16. WordPress REST API User Enumeration ---
# Threat: Username harvesting for brute force
# Observed: ?rest_route=/wp/v2/users/
if ($args ~* "rest_route=/wp/v2/users") {
    return 404;
}
