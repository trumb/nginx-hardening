# =============================================================================
# Nginx Security Hardening Snippet
# Include this in every server block: include /etc/nginx/snippets/security-hardening.conf;
# Maintained at: https://github.com/trumb/nginx-hardening
# Last updated: 2026-03-23 — expanded from ongoing honeypot log analysis
# =============================================================================

# --- Security Headers ---
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

# --- Server Identity ---
server_tokens off;
autoindex off;

# =============================================================================
# BLOCKING RULES — Ordered by threat frequency (from honeypot data)
# 35 categories, all derived from live scanner traffic observed 2026-02 to 2026-03
# =============================================================================

# --- 1. Dotfiles (.git, .env, .htaccess, .DS_Store, .vscode, .vite) ---
# Threat: Credential theft, source code exposure
# Observed: .env (21+ variants), .git/config, .git/HEAD, .git/credentials,
#           .DS_Store, .vscode/sftp.json, .htaccess, .aws/credentials
location ~ /\. {
    deny all;
    return 404;
}

# --- 2. Script extensions (PHP, ASP, JSP) ---
# Threat: Remote code execution
# Observed: info.php, phpinfo.php, test.php, i.php, php_info.php, app_dev.php,
#           setup.php, xdebug.php, xdebug_info.php, pinfo.php, db.php, x.php
location ~* \.(php|asp|aspx|jsp|cgi)$ {
    deny all;
    return 404;
}

# --- 3. Source maps (.map files) ---
# Threat: Source code theft, API key extraction from bundled JS
# Observed: main.js.map, bundle.js.map, stripe.js.map, credentials.json.map,
#           config.js.map, config.json.map (20+ variants)
location ~* \.map$ {
    return 404;
}

# --- 4. Sensitive config/credential files ---
# Threat: Credential theft, infrastructure exposure
# Observed: credentials.json, config.env, env.json, env.js, docker-compose.yml,
#           config.json, config.js, config.php, configuration.php
location ~* (docker-compose\.ya?ml|Dockerfile|Makefile|sftp\.json|environment\.(test|prod|dev)\.(ts|js)|wp-config\.php|web\.config|credentials\.json|config\.env|env\.json|env\.js|config\.json|config\.js|config\.php|configuration\.php|\.env) {
    deny all;
    return 404;
}

# --- 5. WordPress ---
# Threat: Plugin exploits, user enumeration, payment gateway theft
# Observed: wp-admin, wp-content/debug.log, wp-json/wc/v3/payment_gateways,
#           xmlrpc.php, wlwmanifest.xml, wp-content/uploads/sendgrid_keys.json
location ~* ^/(wp-admin|wp-login|wordpress|wp-includes|wp-content|wp-json|xmlrpc\.php) {
    return 404;
}
# WordPress discovery via double-slash paths (//blog/wp-includes/wlwmanifest.xml)
location ~* wlwmanifest\.xml {
    return 404;
}

# --- 6. Java/Spring Boot Actuator ---
# Threat: Environment variable dump (DB creds, API keys)
# Observed: actuator/env, manage/env, api/actuator/env, configprops,
#           actuator/gateway/routes, actuator/health
location ~* ^/(actuator|manage/(env|configprops|health|info|beans|mappings)|configprops) {
    return 404;
}
location ~* /actuator/ {
    return 404;
}

# --- 7. Swagger/OpenAPI Documentation ---
# Threat: API enumeration, endpoint discovery
# Observed: swagger-ui.html, api-docs, v2/api-docs, v3/api-docs,
#           webjars/swagger-ui/index.html, api/swagger.json
location ~* ^/(swagger|api-docs|v2/api-docs|v3/api-docs|webjars/swagger-ui) {
    return 404;
}
location ~* swagger\.json$ {
    return 404;
}

# --- 8. PHP/Laravel/Symfony Debug Tools ---
# Threat: Full application state dump, file read via profiler
# Observed: telescope, _ignition, _profiler, _wdt, __debug__, horizon,
#           debug/default/view?panel=config
location ~* ^/(telescope|_ignition|_profiler|_wdt|__debug__|app_dev\.php|debug|horizon) {
    return 404;
}

# --- 9. Container/Kubernetes/Docker ---
# Threat: Container registry access, K8s secret theft
# Observed: v2/_catalog (Docker Registry), api/v1/namespaces/default/secrets
location ~* ^/(v2/_catalog|api/v1/namespaces) {
    return 404;
}

# --- 10. Vite/Webpack/Next.js Dev Tools ---
# Threat: Dev server access, HMR exploitation, source code theft
# Observed: @vite/client, webpack-dev-server, _next/data/, _next/server
location ~* ^/(@vite|__webpack|_next/(data|server)|webpack-dev-server) {
    return 404;
}

# --- 11. Atlassian (Jira/Confluence) ---
# Threat: CVE exploitation (Confluence RCE), version fingerprinting
# Observed: login.action, /s/{hash}/_/;/META-INF/maven/.../pom.properties
location ~* (META-INF|login\.action|/s/[^/]+/_/) {
    return 404;
}

# --- 12. Microsoft Exchange ---
# Threat: ProxyShell/ProxyLogon exploitation
# Observed: /ecp/Current/exporttool/microsoft.exchange.ediscovery.exporttool.application
location ~* ^/ecp/ {
    return 404;
}

# --- 13. GraphQL Introspection ---
# Threat: Schema enumeration, data theft
# Observed: graphql, graphql?query={__schema{...}}, api/graphql, api/gql
location ~* ^/(graphql|api/graphql|api/gql) {
    return 404;
}

# --- 14. Admin/Management Panels ---
# Threat: Authentication bypass, brute force
# Observed: shell, console, phpmyadmin, adminer, solr, server-status, hudson,
#           druid, manager/html, manager/text/list, cas/login, jenkins
location ~* ^/(shell|console|portal|owa|SDK|phpmyadmin|myadmin|pma|adminer|solr|manager|jmx-console|invoker|status|server-status|server-info|hudson|druid|jenkins|cas|otrs|webmail) {
    return 404;
}

# --- 15. CVE Probes ---
# Threat: Automated vulnerability scanning fingerprinting
# Observed: __cve_probe_cve_test_404 (sent multiple times to analyze response behavior)
location ~* __cve_probe {
    return 404;
}

# --- 16. WordPress REST API User Enumeration ---
# Threat: Username harvesting for brute force
# Observed: ?rest_route=/wp/v2/users/
if ($args ~* "rest_route=/wp/v2/users") {
    return 404;
}

# --- 17. Path Traversal (CVE-2021-41773 and variants) ---
# Threat: Directory traversal to read arbitrary files or execute shell commands
# Observed: /cgi-bin/.%2e/.%2e/bin/sh, /..%2F..%2Fetc%2Fpasswd,
#           /%%32%65%%32%65/ (double-encoded), /%20../  (space-dot-dot)
location ~* ^/(cgi-bin|cgi) {
    return 404;
}
location ~* \.%2e {
    return 404;
}
location ~* \.\.%2[fF] {
    return 404;
}
location ~* %2[fF]\.\. {
    return 404;
}
location ~* %%32%65 {
    return 404;
}
location ~* /etc/(passwd|shadow) {
    return 404;
}

# --- 18. Phishing Kit Detection ---
# Threat: Server hosting stolen phishing kits (Swiss banking, payment systems)
# Observed: /js/twint_ch.js, /js/lkk_ch.js, /css/support_parent.css
location ~* ^/(js/(twint|lkk)|css/support_parent) {
    return 404;
}

# --- 19. Backup/Bin/Shell Directories ---
# Threat: Exposed backup files, shell scripts, compiled binaries
# Observed: /bins/, /bin/, /backup/, /logs/, /database.sql
location ~* ^/(bins?|backup|backups|dump|dumps|sql|db|logs)/ {
    return 404;
}
location ~* database\.sql$ {
    return 404;
}

# --- 20. robots.txt / security.txt (optional — uncomment to hide) ---
# Some operators prefer to return 404 to prevent information disclosure.
# Uncomment if you don't serve legitimate robots.txt or security.txt.
# location = /robots.txt { return 404; }
# location ~* ^/.well-known/security\.txt$ { return 404; }
# location = /security.txt { return 404; }

# =============================================================================
# NEW CATEGORIES — Added 2026-03-23 from log analysis (Mar 9–23)
# =============================================================================

# --- 21. HNAP / Router Discovery ---
# Threat: D-Link/Netgear router exploitation via Home Network Admin Protocol
# Observed: /HNAP1 (66x), /HNAP1/ — used by Mirai variants and router exploit kits
location ~* ^/HNAP1 {
    return 404;
}

# --- 22. VPN/SSL Gateway Probes (Cisco, Pulse Secure, Fortinet) ---
# Threat: Credential harvesting, CVE exploitation (Ivanti/Pulse Secure RCE)
# Observed: /+CSCOE+/logon.html (15x, Cisco AnyConnect),
#           /dana-na/auth/url_default/welcome.cgi (8x, Pulse Secure/Ivanti)
location ~* ^/(\+CSCOE\+|dana-na|remote/(fgt_lang|login)) {
    return 404;
}

# --- 23. Apache Struts RCE ---
# Threat: Remote code execution via Struts2 deserialization (CVE-2017-5638 et al)
# Observed: /struts/utils.js (14x), /struts2-showcase/ (12x),
#           /struts2-rest-showcase/, /struts2-portlet/ — all probing for Struts apps
location ~* ^/(struts|struts2-) {
    return 404;
}

# --- 24. Log4Shell / JNDI Injection (CVE-2021-44228) ---
# Threat: Remote code execution via JNDI lookup in path, headers, or parameters
# Observed: /${jndi:ldap://...} (30x from Greenbone scanner),
#           injected in Referer and User-Agent headers too
location ~* \$\{jndi: {
    return 404;
}
if ($args ~* "\$\{jndi:") {
    return 404;
}
if ($http_referer ~* "\$\{jndi:") {
    return 404;
}

# --- 25. SSH Key / Cloud Credential Theft ---
# Threat: Direct theft of private keys and cloud provider credentials
# Observed: /id_rsa (7x), /id_ed25519 (4x), /.aws/credentials (8x),
#           /.ssh/ (via dotfile rule), /.aws/ (via dotfile rule)
location ~* ^/(id_rsa|id_ed25519|id_dsa) {
    return 404;
}

# --- 26. IoT/OEM Device Exploits ---
# Threat: Router/camera/printer exploitation and default credential abuse
# Observed: /boaform/admin/formLogin (12x, TP-Link/Boa webserver),
#           /GponForm/diag_Form (6x, GPON fiber router RCE),
#           /EXCU_SHELL (7x, Netgear command injection),
#           /config/getuser?index=0 (8x, Hikvision camera),
#           /sdk (64x), /SDK/webLanguage (22x, Hikvision camera),
#           /evox/about (64x, Evox network device fingerprint),
#           /DevMgmt/ProductConfigDyn.xml (29x, HP printer),
#           /hp/jetdirect/, /hp/device/ (HP printer discovery),
#           /PRESENTATION/HTML/TOP/INDEX.HTML (7x, Lexmark/Xerox printer)
location ~* ^/(boaform|GponForm|EXCU_SHELL|evox|DevMgmt) {
    return 404;
}
location ~* ^/(hp/(jetdirect|device)|PRESENTATION) {
    return 404;
}
location ~* ^/config/getuser {
    return 404;
}
location ~* ^/sdk$ {
    return 404;
}
location ~* ^/SDK/webLanguage {
    return 404;
}

# --- 27. Package Manager / Dependency Files ---
# Threat: Dependency confusion, version fingerprinting, lockfile analysis
# Observed: /composer.json (4x), /yarn.lock (3x), /package.json (3x),
#           /package-lock.json, /requirements.txt, /Gemfile,
#           /pom.xml (4x), /src/pom.xml, /struts/src/pom.xml
location ~* (composer\.json|yarn\.lock|package\.json|package-lock\.json|requirements\.txt|Gemfile|Gemfile\.lock|pom\.xml|Pipfile|Pipfile\.lock|go\.sum) {
    return 404;
}

# --- 28. Application Settings / Config Files ---
# Threat: Credential exposure, infrastructure mapping
# Observed: /appsettings.json (4x), /settings.py (6x), /settings.php (4x),
#           /app/config/parameters.yml (6x), /web.xml (5x),
#           /manifest.json (6x), /sso/XUI/locales/ (SSO config),
#           /openam/XUI/locales/ (ForgeRock/OpenAM)
location ~* (appsettings\.json|settings\.(py|php)|parameters\.ya?ml|\.nsf$) {
    return 404;
}
location ~* ^/WEB-INF/ {
    return 404;
}
location ~* ^/(sso|openam)/XUI/ {
    return 404;
}

# --- 29. XDEBUG Remote Debugging ---
# Threat: Remote code execution via PHP debug session hijacking
# Observed: /?XDEBUG_SESSION_START=phpstorm (15x)
if ($args ~* "XDEBUG_SESSION_START") {
    return 404;
}

# --- 30. Enterprise Application Probes (SAP, ManageEngine) ---
# Threat: RCE and data theft via enterprise app vulnerabilities
# Observed: /developmentserver/metadatauploader (11x, SAP NetWeaver CVE-2020-6287),
#           /PassTrixMain.cc (8x, ManageEngine Password Manager Pro),
#           /isgw/Welcome.do (7x), /apiclient/ember/Login.jsp (4x, SonicWall)
location ~* ^/(developmentserver|PassTrixMain|isgw|apiclient) {
    return 404;
}

# --- 31. InfluxDB / Time Series DB ---
# Threat: Database query execution, data exfiltration
# Observed: /query?q=SHOW+DIAGNOSTICS (6x)
location ~* ^/query {
    if ($args ~* "SHOW.+(DIAGNOSTICS|DATABASES|MEASUREMENTS|SERIES|RETENTION)") {
        return 404;
    }
}

# --- 32. Network Infrastructure / Protocol Probes ---
# Threat: Service fingerprinting, IoT/PBX/SCADA discovery
# Observed: /portal/redlion (6x, Red Lion industrial gateway),
#           /cgi-bin/luci/ (12x, OpenWrt router),
#           /cgi-mod/index.cgi, /cgi-bin/authLogin.cgi (QNAP NAS)
location ~* ^/(portal/redlion|cgi-mod) {
    return 404;
}
location ~* ^/cgi-bin/(luci|authLogin|login\.cgi) {
    return 404;
}

# --- 33. Lotus Notes / IBM Domino ---
# Threat: Information disclosure, legacy system exploitation
# Observed: /nonexistent.nsf (4x), /domcfg.nsf (4x) — Lotus Domino probes
# (.nsf handled in rule 28)

# --- 34. Login/Auth Page Bruteforce Discovery ---
# Threat: Credential stuffing, admin panel discovery
# Observed: /LoginPage.do (6x), /Login.aspx (5x), /login.rsp (6x),
#           /login.rst (5x), /login.do (4x), /login.asp (4x)
# Note: These are framework-specific login pages. If your app uses /login,
# add it to your known routes ABOVE the security include.

# --- 35. Miscellaneous Exploit Paths ---
# Threat: Mixed exploit attempts targeting specific vulnerable products
# Observed: /hello.world?...auto_prepend_file=php://input (49x, PHP RCE),
#           /functionRouter (4x, Zhone/DZS router),
#           /partymgr/control/main (4x, Apache OFBiz),
#           /emsapi/ (4x, network management), /nice%20ports (9x, Nmap probe)
location ~* ^/(functionRouter|partymgr|emsapi) {
    return 404;
}
location ~* auto_prepend_file {
    return 404;
}
location ~* allow_url_include {
    return 404;
}
