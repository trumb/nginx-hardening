# =============================================================================
# Optional: Scanner User-Agent blocking
# Add these rules to your server block to drop known scanning tools.
# Uses nginx 444 (close connection with no response).
#
# Last updated: 2026-03-23 — added 15 new scanner signatures from log analysis
#
# Note: This is aggressive — only use on public-facing servers where you
# don't expect traffic from security scanning tools.
# =============================================================================

# --- Known scanner tools ---
# Security scanners, vulnerability assessment tools, and attack frameworks
if ($http_user_agent ~* (l9scan|l9explore|leakix|nuclei|zgrab|masscan|censys|shodan|nmap|nikto|sqlmap|dirbuster|gobuster|ffuf|wfuzz|httpx|jaeles|xray|tsunami|puredns|subfinder|amass|aquatone|eyewitness|whatweb|wpscan|joomscan|droopescan|mrtscan|visionheight|internetmeasurement|cortex.xpanse|paloaltonetworks|oai-searchbot|modatscanner|freepbx-scanner|genomecrawler|BitSightBot)) {
    return 444;
}

# --- HTTP libraries commonly used as scanners ---
# These libraries are rarely used by legitimate browser traffic.
# WARNING: Be careful with go-http-client if you have Go microservices calling this server.
if ($http_user_agent ~* (okhttp|go-http-client|fasthttp|python-requests|python-httpx|libwww-perl|curl/|wget/|libredtail|xfa1|abuse\.xmco)) {
    return 444;
}

# --- Headless browsers (scanner signature) ---
# Real users don't run headless Chrome against your server.
if ($http_user_agent ~* HeadlessChrome) {
    return 444;
}

# --- Empty User-Agent (bots/scanners) ---
if ($http_user_agent = "") {
    return 444;
}

# --- Bare "Mozilla/5.0" (scanner signature) ---
# Real browsers always include engine and version details after the platform token.
if ($http_user_agent = "Mozilla/5.0") {
    return 444;
}

# --- Bare "Mozilla/1.0" (scanner signature) ---
# No legitimate browser has used this UA since the 1990s.
if ($http_user_agent ~ "^Mozilla/[01]\.") {
    return 444;
}

# --- Truncated Chrome UA (scanner signature) ---
# Real Chrome always includes "(KHTML, like Gecko) Chrome/xxx"
if ($http_user_agent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36") {
    return 444;
}

# --- Truncated Chrome UA: missing "(KHTML, like Gecko)" ---
if ($http_user_agent ~* "AppleWebKit/537\.36 Chrome/[0-9]+\.[0-9]+\.[0-9]+$") {
    return 444;
}

# --- Partial Mozilla with no engine (scanner signature) ---
# e.g. "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" with nothing after
if ($http_user_agent ~ "^Mozilla/5\.0 \([^)]+\)$") {
    return 444;
}

# --- Ancient/outdated Chrome versions (scanner signature) ---
# Chrome 20-79 are from 2012-2019. No legitimate user runs these.
if ($http_user_agent ~* "Chrome/[2-7][0-9]\.") {
    return 444;
}

# --- Novelty/joke User-Agents (always scanners) ---
if ($http_user_agent ~* "^(Hello|ECHOSCU|Explorer)") {
    return 444;
}

# --- Odin scanner (attack surface management) ---
if ($http_user_agent ~* "Odin") {
    return 444;
}
